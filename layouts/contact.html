{{ define "main" }}
<style>
.si-icon {
  position: absolute;
  top: 1.25rem;
  right: 1.25rem;
  width: 24px;
  height: 24px;
  opacity: 0.4;
  transition: opacity 0.2s ease;
}
.card:hover .si-icon { opacity: 0.8; }
.card { position: relative; }
</style>

<div class="page-hero">
  <div class="container">
    <div class="page-hero__label">Find me out there</div>
    <h1 class="page-hero__title">Let's Connect</h1>
    <p class="page-hero__subtitle">No contact form — just find me where I actually hang out. Pick your platform.</p>
  </div>
</div>

<section>
  <div class="container">
    <div class="grid-3">

      {{ range .Site.Data.platforms }}
      <a href="{{ .url }}" target="_blank" rel="noopener" class="card" style="display:block;text-decoration:none;">
        <div class="card__body">
          <img class="si-icon" src="{{ if .icon_url }}{{ .icon_url }}{{ else }}https://cdn.simpleicons.org/{{ .icon }}/10b981{{ end }}" alt="{{ .name }}">
          <span class="card__category">{{ .category }}</span>
          <span class="card__title">{{ .name }}</span>
          <p class="card__excerpt">{{ .excerpt }}</p>
        </div>
      </a>
      {{ end }}

    </div>
  </div>
</section>
{{ end }}
