backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - label: "Category"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - { label: "Behind the Build", value: "Builds" }
          - { label: "Project Showcase", value: "Project Showcases" }
          - { label: "Quick Tip", value: "Quick Tips" }
          - { label: "Project Jump", value: "Project Jumps" }
          - { label: "Honest Review", value: "Honest Reviews" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "portfolio"
    label: "Portfolio Projects"
    folder: "content/portfolio"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - label: "Type"
        name: "project_type"
        widget: "select"
        options:
          - { label: "Design", value: "design" }
          - { label: "Make", value: "make" }
          - { label: "Remix", value: "remix" }
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "In Progress", value: "in-progress" }
          - { label: "Finished", value: "finished" }
          - { label: "Abandoned", value: "abandoned" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options:
          - "3D Printing"
          - "Electronics"
          - "Arduino"
          - "Raspberry Pi"
          - "Robotics"
          - "Software"
          - "Crochet"
          - "Woodworking"
          - "Hardware"
          - "Home Automation"
          - "Leatherworking"
      - label: "Platform Links"
        name: "platform_links"
        widget: "list"
        required: false
        hint: "Add one entry per platform where this project is published"
        fields:
          - label: "Platform"
            name: "platform"
            widget: "select"
            options:
              - Ravelry
              - Thingiverse
              - Makerworld
              - Printables
              - GitHub
              - Other
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Original Design URL", name: "original_design_url", widget: "string", required: false, hint: "Makes and Remixes only — link to the pattern or model used" }
      - { label: "Original Designer", name: "original_designer", widget: "string", required: false, hint: "Makes and Remixes only — credit the designer" }
      - { label: "Published URL", name: "published_url", widget: "string", required: false, hint: "Designs only — where is this published publicly?" }
      - label: "Availability"
        name: "availability"
        widget: "select"
        required: false
        options:
          - { label: "Free", value: "free" }
          - { label: "Paid", value: "paid" }
        hint: "Designs only"
      - { label: "Body", name: "body", widget: "markdown" }
